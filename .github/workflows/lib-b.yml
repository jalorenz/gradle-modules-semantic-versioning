name: Lib b

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # fetch all history
          filter: blob:none # exclude file contents for faster checkout
      - uses: paulhatch/semantic-version@v5.4.0
        id: semantic_version
        with:
          enable_prerelease_mode: 'false'
          bump_each_commit: 'false'
          bump_each_commit_patch_pattern: ''
          change_path: 'lib-b/**/* build.gradle.kts settings.gradle.kts'
          namespace: 'lib-b'
          search_commit_body: 'false'
          user_format_type: 'csv'
          debug: 'false'
          use_branches: 'false'
          version_format: '${major}.${minor}.${patch}'
          version_from_branch: 'false'
          major_pattern: '/!:|BREAKING CHANGE:/'
          major_regexp_flags: ''
          minor_pattern: "/feat(\\(.+\\))?:/"
      - name: Setup gradle
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        uses: gradle/actions/setup-gradle@v6
      - name: Release lib b
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        run: ./gradlew :lib-b:publish -Pversion=${{ steps.semantic_version.outputs.version }}
        env:
          GPR_USERNAME: jalorenz
          GPR_TOKEN: ${{ secrets.WRITE_GITHUB_PACKAGES_PAT }}
      - name: Create changelog text
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        id: changelog
        uses: loopwerk/tag-changelog@v1
        with:
          token: ${{ secrets.WRITE_GITHUB_PACKAGES_PAT }}
          exclude_types: other,docs,chore
      - name: Create release
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semantic_version.outputs.version_tag }}
          name: Release ${{ steps.semantic_version.outputs.version_tag }}
          body: ${{ steps.changelog.outputs.changes }}
          token: ${{ secrets.WRITE_GITHUB_PACKAGES_PAT }}
