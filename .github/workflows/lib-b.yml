name: Lib b

on:
  push:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # fetch all history
          filter: blob:none # exclude file contents for faster checkout
      - uses: paulhatch/semantic-version@v5.4.0
        id: semantic_version
        with:
          enable_prerelease_mode: 'false'
          bump_each_commit: 'false'
          bump_each_commit_patch_pattern: ''
          change_path: 'lib-b/**/* build.gradle.kts settings.gradle.kts'
          namespace: 'lib-b'
          search_commit_body: 'false'
          user_format_type: 'csv'
          debug: 'false'
          use_branches: 'false'
          version_format: '${major}.${minor}.${patch}'
          version_from_branch: 'false'
      - name: Setup gradle
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        uses: gradle/actions/setup-gradle@v6
      - name: Release lib b
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        run: ./gradlew :lib-b:publish -Pversion=${{ steps.semantic_version.outputs.version }}
        env:
          GPR_USERNAME: jalorenz
          GPR_TOKEN: ${{ secrets.WRITE_GITHUB_PACKAGES_PAT }}
      - name: Create and push tag
        if: ${{ steps.semantic_version.outputs.changed == 'true' }}
        env:
          TAG: ${{ steps.semantic_version.outputs.version_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
